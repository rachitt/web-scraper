reddit:
  subreddits:
    - SaaS
    - smallbusiness
    - Entrepreneur
    - startups
    - freelance
    - productivity
    - webdev
  sort: hot            # hot, new, top
  time_filter: week    # hour, day, week, month, year, all (only for top)
  limit: 50            # posts per subreddit
  comments:
    enabled: true
    max_depth: 10

analysis:
  batch_size: 50
  export_path: data/analyze_input.json
  import_path: data/analyze_results.json

filter:
  pain_keywords:
    - frustrated
    - struggling
    - pain point
    - wish there was
    - looking for
    - need a tool
    - hate using
    - waste of time
    - broken
    - annoying
    - difficult
    - impossible
    - expensive
    - overpriced
    - clunky
    - slow
    - buggy
    - manual process
    - time consuming
    - no good solution
  thresholds:
    posts: 2
    comments: 1

storage:
  db_path: data/scraper.db
